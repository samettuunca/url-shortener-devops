name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Docker image build et
        run: docker build -t url-shortener:${{ github.sha }} .

      - name: Trivy ile güvenlik taraması yap
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: url-shortener:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1